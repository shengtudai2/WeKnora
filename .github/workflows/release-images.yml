name: Build and Upload Docker Images to Release

on:
  release:
    types: [published]

env:
  IMAGE_NAME_APP: weknora-app
  IMAGE_NAME_DOCREADER: weknora-docreader
  IMAGE_NAME_SANDBOX: weknora-sandbox
  IMAGE_NAME_UI: weknora-ui

jobs:
  get-version:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
      tag: ${{ steps.version.outputs.tag }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Determine tag to build
        id: version
        run: |
          echo "tag=${{ github.event.release.tag_name }}" >> $GITHUB_OUTPUT
          echo "version=${{ github.event.release.tag_name }}" >> $GITHUB_OUTPUT

  build-frontend:
    runs-on: ubuntu-latest
    needs: get-version
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build frontend Image
        uses: docker/build-push-action@v6
        with:
          push: false
          load: true
          platforms: linux/amd64,linux/arm64
          file: frontend/Dockerfile
          context: ./frontend
          tags: ${{ env.IMAGE_NAME_UI }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Save and upload frontend image
        run: |
          VERSION="${{ needs.get-version.outputs.version }}"
          docker save ${{ env.IMAGE_NAME_UI }}:latest -o ${{ env.IMAGE_NAME_UI }}-${VERSION#v}.tar
          gzip ${{ env.IMAGE_NAME_UI }}-${VERSION#v}.tar
        shell: bash

      - name: Upload frontend image
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ env.IMAGE_NAME_UI }}-${{ needs.get-version.outputs.version }}.tar.gz
          generate_release_notes: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  build-docreader:
    runs-on: ubuntu-latest
    needs: get-version
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build docreader Image
        uses: docker/build-push-action@v6
        with:
          push: false
          load: true
          platforms: linux/amd64,linux/arm64
          file: docker/Dockerfile.docreader
          context: .
          tags: ${{ env.IMAGE_NAME_DOCREADER }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Save and upload docreader image
        run: |
          VERSION="${{ needs.get-version.outputs.version }}"
          docker save ${{ env.IMAGE_NAME_DOCREADER }}:latest -o ${{ env.IMAGE_NAME_DOCREADER }}-${VERSION#v}.tar
          gzip ${{ env.IMAGE_NAME_DOCREADER }}-${VERSION#v}.tar
        shell: bash

      - name: Upload docreader image
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ env.IMAGE_NAME_DOCREADER }}-${{ needs.get-version.outputs.version }}.tar.gz
          generate_release_notes: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  build-sandbox:
    runs-on: ubuntu-latest
    needs: get-version
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build sandbox Image
        uses: docker/build-push-action@v6
        with:
          push: false
          load: true
          platforms: linux/amd64,linux/arm64
          file: docker/Dockerfile.sandbox
          context: .
          tags: ${{ env.IMAGE_NAME_SANDBOX }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Save and upload sandbox image
        run: |
          VERSION="${{ needs.get-version.outputs.version }}"
          docker save ${{ env.IMAGE_NAME_SANDBOX }}:latest -o ${{ env.IMAGE_NAME_SANDBOX }}-${VERSION#v}.tar
          gzip ${{ env.IMAGE_NAME_SANDBOX }}-${VERSION#v}.tar
        shell: bash

      - name: Upload sandbox image
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ env.IMAGE_NAME_SANDBOX }}-${{ needs.get-version.outputs.version }}.tar.gz
          generate_release_notes: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  build-app:
    strategy:
      matrix:
        include:
          - arch: amd64
            platform: linux/amd64
            runs: ubuntu-latest
          - arch: arm64
            platform: linux/arm64
            runs: ubuntu-24.04-arm
    runs-on: ${{ matrix.runs }}
    needs: get-version
    timeout-minutes: 60
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Prepare version info
        id: version
        run: |
          VERSION="${{ needs.get-version.outputs.version }}"
          echo "version=${VERSION#v}" >> $GITHUB_OUTPUT
          echo "commit_id=${GITHUB_SHA:0:8}" >> $GITHUB_OUTPUT
          echo "build_time=$(date -u +'%Y-%m-%dT%H:%M:%SZ')" >> $GITHUB_OUTPUT
          echo "go_version=1.24" >> $GITHUB_OUTPUT

      - name: Build app Image
        id: build
        uses: docker/build-push-action@v6
        with:
          push: false
          load: true
          platforms: ${{ matrix.platform }}
          file: docker/Dockerfile.app
          context: .
          build-args: |
            VERSION_ARG=${{ steps.version.outputs.version }}
            COMMIT_ID_ARG=${{ steps.version.outputs.commit_id }}
            BUILD_TIME_ARG=${{ steps.version.outputs.build_time }}
            GO_VERSION_ARG=${{ steps.version.outputs.go_version }}
          tags: ${{ env.IMAGE_NAME_APP }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Save and upload app image
        run: |
          VERSION="${{ needs.get-version.outputs.version }}"
          ARCH="${{ matrix.arch }}"
          docker save ${{ env.IMAGE_NAME_APP }}:latest -o ${{ env.IMAGE_NAME_APP }}-${VERSION#v}-${ARCH}.tar
          gzip ${{ env.IMAGE_NAME_APP }}-${VERSION#v}-${ARCH}.tar
        shell: bash

      - name: Upload app image
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ env.IMAGE_NAME_APP }}-${{ needs.get-version.outputs.version }}-${{ matrix.arch }}.tar.gz
          generate_release_notes: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  complete:
    runs-on: ubuntu-latest
    needs: [build-app, build-frontend, build-docreader, build-sandbox, get-version]
    if: always()
    steps:
      - name: Create summary
        run: |
          VERSION="${{ needs.get-version.outputs.tag }}"
          echo "## ✅ Release 镜像构建完成" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**版本**: $VERSION" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### 已上传的镜像文件" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| 组件 | 文件名 |" >> $GITHUB_STEP_SUMMARY
          echo "|-----|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| Frontend | \`weknora-ui-${VERSION}-linux-amd64-arm64.tar.gz\` |" >> $GITHUB_STEP_SUMMARY
          echo "| Docreader | \`weknora-docreader-${VERSION}-linux-amd64-arm64.tar.gz\` |" >> $GITHUB_STEP_SUMMARY
          echo "| Sandbox | \`weknora-sandbox-${VERSION}-linux-amd64-arm64.tar.gz\` |" >> $GITHUB_STEP_SUMMARY
          echo "| App | \`weknora-app-${VERSION}-linux-amd64.tar.gz\` |" >> $GITHUB_STEP_SUMMARY
          echo "| App | \`weknora-app-${VERSION}-linux-arm64.tar.gz\` |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### 加载镜像" >> $GITHUB_STEP_SUMMARY
          echo "\`\`\`bash" >> $GITHUB_STEP_SUMMARY
          echo "docker load -i weknora-app-v0.3.6-linux-amd64.tar.gz" >> $GITHUB_STEP_SUMMARY
          echo "docker load -i weknora-app-v0.3.6-linux-arm64.tar.gz" >> $GITHUB_STEP_SUMMARY
          echo "\`\`\`" >> $GITHUB_STEP_SUMMARY